<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study cat ✦</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/cat-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courgette&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="start-screen">
        <div class="start-box">
            <h1 class="start-title">WELCOME ✦</h1>

            <input type="text" class="start-name" placeholder="what's your name?">
            <p class="choose-text">choose your look</p>
            <div class="start-cats">
                <img src="assets/profile_blue.png" class="choose-cat pfp-option selected" data-pfp="blue">
                <img src="assets/profile_green.png" class="choose-cat pfp-option" data-pfp="green">
                <img src="assets/profile_orange.png" class="choose-cat pfp-option" data-pfp="orange">
                <img src="assets/profile_purple.png" class="choose-cat pfp-option" data-pfp="purple">
            </div>
            <p class="choose-text">choose your cat</p>
            <div class="start-cats">
                <img src="assets/black25.gif" class="choose-cat black-option selected">
                <img src="assets/orange25.gif" class="choose-cat orange-option">
            </div>
            <button class="start-button">
                START
            </button>
        </div>
    </div>

    <div class="window-box pomodoro-window">
        <div class="pomodoro-header">
            <p class="pomodoro-title">POMODORO✦</p>
            <button class="close-button">X</button>
        </div>
        <div class="pomodoro-inner">
            <div class="mode-buttons">
                <button class="mode-work active" onclick="showWork()">Work</button>
                <button class="mode-break inactive" onclick="showBreak()">Break</button>
            </div>
            <p class="message">YOU CAN DO IT✦</p>
            <div class="timer">25:00</div>
            <img class="cat-gif" src="assets/pomodoro/cat-idle.gif">
            <div class="pomodoro-buttons">
                <button class="play-btn">▶</button>
                <button class="reset-btn">↺</button>
            </div>
        </div>
    </div>

    <div class="window-box todolist-window">
        <div class="todo-header">
            <p class="todo-title">TO DO LIST</p>
            <button class="todo-close">X</button>
        </div>
        <div class="todo-inner">
            <div class="todo-add-bar">
                <input type="text" class="todo-input" placeholder="write your task...">
                <button class="todo-add-btn">+</button>
            </div>
            <div class="todo-list"></div>
            <img class="todo-cat" src="assets/cat_dance.gif">
        </div>
    </div>

    <div class="floating-profile">
        <img class="profile-cat" src="assets/black25.gif">
        <p class="profile-username">vishwa</p>
        <div class="cat-message"></div>
        <div class="session-popup"></div>
    </div>

    <div class="window-box profile-card-window">
        <div class="profile-card-header">
            <p class="profile-card-title">PROFILE ✦</p>
            <button class="profile-card-close">X</button>
        </div>

        <div class="profile-card-inner">
            <img class="card-pfp" src="assets/profile_blue.png">
            <p class="card-username">vishwa</p>
            <input class="card-bio" type="text" placeholder="write your bio...">
            <button class="card-bio-save">save</button>
            <p class="card-bio-display"></p>
        </div>
    </div>

    <script src="js/todo.js"></script>
    <script src="js/drag.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
